candidate_id: start_local_server_v1
overrides: start_local_server
active: true
version: 1.1
status: dev
release: "1.1"

entrypoint:
  type: python
  path: scripts/start_local_server.py
  callable: start_local_server

scope:
  # First version: local Node/Vite-style fixtures only.
  - fixtures/tiny_node_server
  - fixtures/vite_login_bug

notes: >
  Real subprocess-based server lifecycle. Copies the fixture to a sandbox,
  resolves the start command (explicit > package.json dev/start > preferred),
  checks it against the Safety Gate, launches it in its own process group,
  detects the localhost URL within a timeout, and writes server.log /
  result.json / process.json.
  v1.1 adds a keep_alive input: keep_alive=false keeps the original
  detect-and-cleanup behavior; keep_alive=true leaves the process + sandbox
  alive and emits server_session.json so a later step can use server_url, with
  an idempotent teardown(session) helper. The orchestrator tears down any
  kept-alive sessions at the end of an eval. Promotion needs human review
  because it executes shell commands.
