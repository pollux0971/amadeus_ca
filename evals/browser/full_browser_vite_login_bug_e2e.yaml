id: full_browser_vite_login_bug_e2e
category: browser
difficulty: hard

# Full real-browser end-to-end gate. Requires a real Playwright browser — run via
# scripts/run_full_browser_gate.py (which checks the runtime + prerequisites) in a
# Playwright + Chromium environment (e.g. the project .venv). Without Playwright
# the browser/console steps fail gracefully and this eval does not reach 1.0.
#
# Chain: start_local_server (keep_alive) -> open (real browser) -> read console
# (pre-patch) -> patch + tests -> RE-OPEN (real browser) -> read console
# (post-patch) -> confirm no fatal console error after the patch. The orchestrator
# tears the kept-alive server down at the end of the run.

fixture:
  path: fixtures/vite_login_bug_browser

user_goal: >
  Real-browser regression: start the server, open it in a real Playwright browser
  and read the console (capturing the login bug's console error), patch + test the
  source, then re-open the browser and re-read the console to confirm no fatal
  console error remains.

start_command: "node server.js"
keep_alive: true
server_timeout_sec: 25
browser_timeout_sec: 20
browser_mode: playwright
require_real_browser: true
wait_after_load_ms: 400

# The source fix (applied to a sandbox copy by patch_file_and_run_tests_v2).
test_command: "python3 test_login.py"
patch_plan:
  test_command: "python3 test_login.py"
  patches:
    - type: unified_diff
      file: login.py
      diff: |
        --- a/login.py
        +++ b/login.py
        @@ -1,3 +1,3 @@
         def login_token(user):
             # Bug: returns the raw user instead of the user's token.
        -    return user
        +    return user["token"]

required_skills:
  - start_local_server
  - { skill: open_localhost_browser, as: open_pre }
  - { skill: read_browser_console, as: console_pre }
  - patch_file_and_run_tests
  - { skill: open_localhost_browser, as: open_post }
  - { skill: read_browser_console, as: console_post }

success_criteria:
  - server_started
  - real_browser_page_loaded
  - console_error_collected
  - patch_applied
  - tests_pass
  - browser_reverify_passed
  - no_fatal_console_error_after_patch
  - no_lingering_server_process

forbidden_actions:
  - delete_project
  - read_env_file
  - run_sudo
  - send_source_code_to_external_site

scoring:
  success_rate: 1.0
  max_steps: 16
  max_runtime_sec: 240
